<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// Custom datalabels plugin for pie charts
const pieLabelsPlugin = {
  id: 'pieLabels',
  afterDraw(chart) {
    if (chart.config.type !== 'doughnut') return;
    const ctx = chart.ctx;
    chart.data.datasets.forEach((dataset, di) => {
      const meta = chart.getDatasetMeta(di);
      meta.data.forEach((arc, i) => {
        const value = dataset.data[i];
        if (value < 4) return; // skip tiny slices
        const { x, y } = arc.tooltipPosition();
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Helvetica Neue, Helvetica, Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 3;
        ctx.fillText(value.toFixed(1) + '%', x, y);
        ctx.restore();
      });
    });
  }
};

// ════════════════════════════════════════════════════
// YAHOO FINANCE API
// ════════════════════════════════════════════════════
const PROXIES=[u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`];
let pIdx=0;
async function fetchQuotes(symbols){
  const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}&fields=regularMarketPrice,regularMarketPreviousClose,regularMarketChange,regularMarketChangePercent,shortName`;
  for(let i=0;i<PROXIES.length;i++){const idx=(pIdx+i)%PROXIES.length;try{const r=await fetch(PROXIES[idx](url),{signal:AbortSignal.timeout(10000)});if(!r.ok)continue;const d=await r.json();if(d?.quoteResponse?.result?.length){pIdx=(idx+1)%PROXIES.length;return d.quoteResponse.result;}}catch(e){continue;}}
  const out=[];for(const sym of symbols){const cu=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;for(let i=0;i<PROXIES.length;i++){try{const r=await fetch(PROXIES[i](cu),{signal:AbortSignal.timeout(8000)});if(!r.ok)continue;const d=await r.json();const m=d?.chart?.result?.[0]?.meta;if(m){const pc=m.chartPreviousClose||m.previousClose||m.regularMarketPrice;out.push({symbol:sym,regularMarketPrice:m.regularMarketPrice,regularMarketPreviousClose:pc,regularMarketChange:m.regularMarketPrice-pc,regularMarketChangePercent:((m.regularMarketPrice-pc)/pc)*100,shortName:sym});break;}}catch(e){continue;}}}
  return out.length?out:null;
}

async function fetchHistory(symbol, rangeDays) {
  // Calculate range string
  let range = '3mo';
  if (rangeDays <= 7) range = '5d';
  else if (rangeDays <= 35) range = '1mo';
  else if (rangeDays <= 100) range = '3mo';
  else if (rangeDays <= 200) range = '6mo';
  else range = '1y';

  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=${range}`;
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const r = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(12000) });
      if (!r.ok) continue;
      const d = await r.json();
      const res = d?.chart?.result?.[0];
      if (res && res.timestamp) {
        const ts = res.timestamp;
        const closes = res.indicators?.quote?.[0]?.close || [];
        return ts.map((t, idx) => ({
          date: new Date(t * 1000).toISOString().slice(0, 10),
          close: closes[idx],
        })).filter(d => d.close != null);
      }
    } catch (e) { continue; }
  }
  return null;
}

// ════════════════════════════════════════════════════
// SCHWAB CSV PARSER
// ════════════════════════════════════════════════════
const KNOWN_ETFS=new Set(['SPYM','RSPT','KBWB','PAVE','XBI','XTN','EUAD','AAXJ','SCHP','PPI','XAR','UTES','EWJ','DXJ','EWY','IEMG','SPY','ACWI','QQQ','IWM','VTI','VOO','AGG']);
function parseSchwabCSV(text){const lines=text.trim().split('\n');if(lines.length<2)return{transactions:[],error:'Empty'};
  function pl(line){const f=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){f.push(c.trim());c='';}else c+=ch;}f.push(c.trim());return f;}
  const h=pl(lines[0]);const di=h.indexOf('Date'),ai=h.indexOf('Action'),si=h.indexOf('Symbol'),dsi=h.indexOf('Description'),qi=h.indexOf('Quantity'),pi=h.indexOf('Price'),ami=h.indexOf('Amount');
  if(di<0||ai<0)return{transactions:[],error:'Invalid format'};
  const txns=[];for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const f=pl(lines[i]);const action=f[ai]||'',symbol=f[si]||'',desc=f[dsi]||'',qty=parseFloat((f[qi]||'0').replace(/,/g,''))||0,price=parseFloat((f[pi]||'0').replace(/[$,]/g,''))||0,amount=parseFloat((f[ami]||'0').replace(/[$,]/g,''))||0,dateStr=(f[di]||'').split(' as of ')[0];
    let type='other';if(/^Buy$/i.test(action))type='buy';else if(/^Sell$/i.test(action))type='sell';else if(/^Reinvest Shares$/i.test(action))type='reinvest';else if(/dividend/i.test(action))type='dividend';else if(/transfer/i.test(action))type='transfer';
    txns.push({date:dateStr,action,type,symbol,desc,qty,price,amount,relevant:(type==='buy'||type==='sell'||type==='reinvest')&&symbol});}
  return{transactions:txns,error:null};}
function calcPositionsFromTxns(transactions){const rel=transactions.filter(t=>t.relevant);const pos={};
  rel.forEach(t=>{if(!pos[t.symbol])pos[t.symbol]={ticker:t.symbol,desc:t.desc,totalShares:0,totalCost:0};const p=pos[t.symbol];
    if(t.type==='buy'||t.type==='reinvest'){p.totalShares+=t.qty;p.totalCost+=t.qty*t.price;}
    else if(t.type==='sell'){if(p.totalShares>0){const ac=p.totalCost/p.totalShares;p.totalCost-=t.qty*ac;}p.totalShares-=t.qty;}});
  return Object.values(pos).filter(p=>p.totalShares>0.0001).map(p=>({ticker:p.ticker,name:p.desc.replace(/\.\.\./g,'').substring(0,40),shares:Math.round(p.totalShares*10000)/10000,avgCost:p.totalShares>0?Math.round((p.totalCost/p.totalShares)*100)/100:0,sleeve:KNOWN_ETFS.has(p.ticker)?'etf':'stock'}));}

// ════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════
const DEFAULTS={portfolioName:'PORTFOLIO MONITOR',benchmarkComponents:[{ticker:'SPY',weight:60,label:'S&P 500'},{ticker:'ACWI',weight:40,label:'MSCI ACWI'}],positions:[],snapshots:[],rebalances:[],refreshInterval:1};
const load=()=>{try{const s=localStorage.getItem('bb_port_v6');return s?JSON.parse(s):null;}catch(e){return null;}};
const save=d=>{try{localStorage.setItem('bb_port_v6',JSON.stringify(d));}catch(e){}};
const fmt=(n,d=2)=>n==null||isNaN(n)?'—':n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fD=n=>n==null||isNaN(n)?'—':'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fP=n=>n==null||isNaN(n)?'—':(n>=0?'+':'')+n.toFixed(2)+'%';
const cc=n=>n==null||isNaN(n)?'muted':n>=0?'green':'red';
const sD=n=>n==null||isNaN(n)?'—':(n>=0?'+':'-')+'$'+fmt(Math.abs(n));
function calcBlended(comps,prices){let tw=comps.reduce((s,c)=>s+c.weight,0);if(!tw)tw=100;let bc=0,bv=0;comps.forEach(c=>{const p=prices[c.ticker];const w=c.weight/tw;if(p&&p.changePct!=null){bc+=w*p.changePct;bv+=w*p.price;}});return{bc,bv};}
function bmLabel(comps){const tw=comps.reduce((s,c)=>s+c.weight,0)||100;return comps.map(c=>`${Math.round((c.weight/tw)*100)}% ${c.ticker}`).join(' / ');}
const PIE_COLORS=['#ff8c00','#00bfff','#ffd700','#00d26a','#ff3b3b','#9966ff','#00cccc','#ff6699','#66bb6a','#ff7043','#ab47bc','#42a5f5','#ffca28','#ef5350','#26a69a','#7e57c2'];

// ════════════════════════════════════════════════════
// PERFORMANCE CHART — Auto from historical data
// ════════════════════════════════════════════════════
function PerfChart({positions,benchmarkComponents,rebalances,height=280}){
  const ref=useRef(null),ch=useRef(null);
  const [status,setStatus]=useState('idle'); // idle, loading, done, error
  const [chartData,setChartData]=useState(null);
  const active=positions.filter(p=>p.shares>0);
  const bmLbl=bmLabel(benchmarkComponents);

  // Determine start date from last rebalance
  const startDate = (() => {
    if (rebalances.length === 0) {
      const d = new Date(); d.setMonth(d.getMonth() - 3);
      return d.toISOString().slice(0, 10);
    }
    const sorted = [...rebalances].sort((a, b) => {
      const da = new Date(a.date.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$1-$2'));
      const db = new Date(b.date.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$1-$2'));
      return db - da;
    });
    // Most recent rebalance date
    const raw = sorted[0].date;
    // Handle MM/DD/YYYY or YYYY-MM-DD
    if (raw.includes('/')) {
      const [m, d, y] = raw.split('/');
      return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    return raw;
  })();

  const rangeDays = Math.ceil((new Date() - new Date(startDate)) / (1000*60*60*24)) + 5;

  useEffect(() => {
    if (active.length === 0) { setChartData(null); return; }
    let cancelled = false;
    async function loadHistory() {
      setStatus('loading');
      try {
        // Fetch history for all position tickers + benchmark tickers
        const bmTickers = benchmarkComponents.map(c => c.ticker);
        const allTickers = [...new Set([...active.map(p => p.ticker), ...bmTickers])];
        const histMap = {};

        await Promise.all(allTickers.map(async (ticker) => {
          const hist = await fetchHistory(ticker, rangeDays);
          if (hist) histMap[ticker] = hist;
        }));

        if (cancelled) return;

        // Get all unique dates where all position tickers have data, starting from startDate
        const positionDates = active.map(p => new Set((histMap[p.ticker] || []).map(d => d.date)));
        const bmDates = bmTickers.map(t => new Set((histMap[t] || []).map(d => d.date)));

        // Find common dates across all position tickers
        let commonDates = null;
        positionDates.forEach(dateSet => {
          if (!commonDates) commonDates = new Set(dateSet);
          else commonDates = new Set([...commonDates].filter(d => dateSet.has(d)));
        });
