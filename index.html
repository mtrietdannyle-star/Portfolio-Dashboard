const pieLabelsPlugin={id:'pieLabels',afterDraw(chart){if(chart.config.type!=='doughnut')return;const ctx=chart.ctx;chart.data.datasets.forEach((ds,di)=>{const meta=chart.getDatasetMeta(di);meta.data.forEach((arc,i)=>{const v=ds.data[i];if(v<4)return;const{x,y}=arc.tooltipPosition();ctx.save();ctx.fillStyle='#fff';ctx.font='bold 10px Helvetica';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=3;ctx.fillText(v.toFixed(1)+'%',x,y);ctx.restore();});})}};

// ════════════════════════════════════════════════════
// YAHOO FINANCE
// ════════════════════════════════════════════════════
const PROXIES=[u=>'https://corsproxy.io/?url='+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)];
let pIdx=0;

async function fetchQuotes(symbols){
  const url='https://query1.finance.yahoo.com/v7/finance/quote?symbols='+symbols.join(',')+'&fields=regularMarketPrice,regularMarketPreviousClose,regularMarketChange,regularMarketChangePercent,shortName';
  for(let i=0;i<PROXIES.length;i++){const idx=(pIdx+i)%PROXIES.length;try{const r=await fetch(PROXIES[idx](url),{signal:AbortSignal.timeout(10000)});if(!r.ok)continue;const d=await r.json();if(d&&d.quoteResponse&&d.quoteResponse.result&&d.quoteResponse.result.length){pIdx=(idx+1)%PROXIES.length;return d.quoteResponse.result;}}catch(e){continue;}}
  const out=[];for(const sym of symbols){const cu='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=5d';for(let i=0;i<PROXIES.length;i++){try{const r=await fetch(PROXIES[i](cu),{signal:AbortSignal.timeout(8000)});if(!r.ok)continue;const d=await r.json();const m=d&&d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta;if(m){const pc=m.chartPreviousClose||m.previousClose||m.regularMarketPrice;out.push({symbol:sym,regularMarketPrice:m.regularMarketPrice,regularMarketPreviousClose:pc,regularMarketChange:m.regularMarketPrice-pc,regularMarketChangePercent:((m.regularMarketPrice-pc)/pc)*100,shortName:sym});break;}}catch(e){continue;}}}
  return out.length?out:null;
}

async function fetchBatchHistory(symbols,range){
  const url='https://query1.finance.yahoo.com/v8/finance/spark?symbols='+symbols.join(',')+'&range='+range+'&interval=1d';
  for(let i=0;i<PROXIES.length;i++){
    try{
      const r=await fetch(PROXIES[i](url),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;
      const d=await r.json();const results={};
      if(d&&d.spark&&d.spark.result){d.spark.result.forEach(function(item){const sym=item.symbol;const resp=item.response&&item.response[0];if(resp&&resp.timestamp){const closes=resp.indicators&&resp.indicators.quote&&resp.indicators.quote[0]&&resp.indicators.quote[0].close||[];results[sym]=resp.timestamp.map(function(t,idx){return{date:new Date(t*1000).toISOString().slice(0,10),close:closes[idx]}}).filter(function(d){return d.close!=null})}});}
      if(Object.keys(results).length>0)return results;
    }catch(e){continue;}
  }
  // Fallback: individual chart for benchmarks
  const results={};
  for(let s=0;s<Math.min(symbols.length,4);s++){
    const sym=symbols[s];
    const cu='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range='+range;
    for(let i=0;i<PROXIES.length;i++){try{const r=await fetch(PROXIES[i](cu),{signal:AbortSignal.timeout(10000)});if(!r.ok)continue;const d=await r.json();const res=d&&d.chart&&d.chart.result&&d.chart.result[0];if(res&&res.timestamp){const closes=res.indicators&&res.indicators.quote&&res.indicators.quote[0]&&res.indicators.quote[0].close||[];results[sym]=res.timestamp.map(function(t,idx){return{date:new Date(t*1000).toISOString().slice(0,10),close:closes[idx]}}).filter(function(d){return d.close!=null});break;}}catch(e){continue;}}
    await new Promise(function(r){setTimeout(r,300)});
  }
  return Object.keys(results).length>0?results:null;
}

// ════════════════════════════════════════════════════
// SCHWAB CSV
// ════════════════════════════════════════════════════
const KNOWN_ETFS=new Set(['SPYM','RSPT','KBWB','PAVE','XBI','XTN','EUAD','AAXJ','SCHP','PPI','XAR','UTES','EWJ','DXJ','EWY','IEMG','SPY','ACWI','QQQ','IWM','VTI','VOO','AGG']);
function parseSchwabCSV(text){const lines=text.trim().split('\n');if(lines.length<2)return{transactions:[],error:'Empty'};function pl(line){const f=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){f.push(c.trim());c='';}else c+=ch;}f.push(c.trim());return f;}const h=pl(lines[0]);const di=h.indexOf('Date'),ai=h.indexOf('Action'),si=h.indexOf('Symbol'),dsi=h.indexOf('Description'),qi=h.indexOf('Quantity'),pi=h.indexOf('Price'),ami=h.indexOf('Amount');if(di<0||ai<0)return{transactions:[],error:'Invalid format'};const txns=[];for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const f=pl(lines[i]);const action=f[ai]||'',symbol=f[si]||'',desc=f[dsi]||'',qty=parseFloat((f[qi]||'0').replace(/,/g,''))||0,price=parseFloat((f[pi]||'0').replace(/[$,]/g,''))||0,amount=parseFloat((f[ami]||'0').replace(/[$,]/g,''))||0,dateStr=(f[di]||'').split(' as of ')[0];let type='other';if(/^Buy$/i.test(action))type='buy';else if(/^Sell$/i.test(action))type='sell';else if(/^Reinvest Shares$/i.test(action))type='reinvest';else if(/dividend/i.test(action))type='dividend';else if(/transfer/i.test(action))type='transfer';txns.push({date:dateStr,action:action,type:type,symbol:symbol,desc:desc,qty:qty,price:price,amount:amount,relevant:(type==='buy'||type==='sell'||type==='reinvest')&&!!symbol});}return{transactions:txns,error:null};}
function calcPositionsFromTxns(transactions){const rel=transactions.filter(function(t){return t.relevant});const pos={};rel.forEach(function(t){if(!pos[t.symbol])pos[t.symbol]={ticker:t.symbol,desc:t.desc,totalShares:0,totalCost:0};const p=pos[t.symbol];if(t.type==='buy'||t.type==='reinvest'){p.totalShares+=t.qty;p.totalCost+=t.qty*t.price;}else if(t.type==='sell'){if(p.totalShares>0){const ac=p.totalCost/p.totalShares;p.totalCost-=t.qty*ac;}p.totalShares-=t.qty;}});return Object.values(pos).filter(function(p){return p.totalShares>0.0001}).map(function(p){return{ticker:p.ticker,name:p.desc.replace(/\.\.\./g,'').substring(0,40),shares:Math.round(p.totalShares*10000)/10000,avgCost:p.totalShares>0?Math.round((p.totalCost/p.totalShares)*100)/100:0,sleeve:KNOWN_ETFS.has(p.ticker)?'etf':'stock'}});}

const DEFAULTS={portfolioName:'PORTFOLIO MONITOR',benchmarkComponents:[{ticker:'SPY',weight:60,label:'S&P 500'},{ticker:'ACWI',weight:40,label:'MSCI ACWI'}],positions:[],snapshots:[],rebalances:[],refreshInterval:1};
const load=function(){try{const s=localStorage.getItem('bb_port_v7');return s?JSON.parse(s):null;}catch(e){return null;}};
const save=function(d){try{localStorage.setItem('bb_port_v7',JSON.stringify(d));}catch(e){}};
const fmt=function(n,d){d=d||2;return n==null||isNaN(n)?'\u2014':n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})};
const fD=function(n){return n==null||isNaN(n)?'\u2014':'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};
const fP=function(n){return n==null||isNaN(n)?'\u2014':(n>=0?'+':'')+n.toFixed(2)+'%'};
const cc=function(n){return n==null||isNaN(n)?'muted':n>=0?'green':'red'};
const sD=function(n){return n==null||isNaN(n)?'\u2014':(n>=0?'+':'-')+'$'+fmt(Math.abs(n))};
function calcBlended(comps,prices){var tw=comps.reduce(function(s,c){return s+c.weight},0);if(!tw)tw=100;var bc=0,bv=0;comps.forEach(function(c){var p=prices[c.ticker];var w=c.weight/tw;if(p&&p.changePct!=null){bc+=w*p.changePct;bv+=w*p.price;}});return{bc:bc,bv:bv};}
function bmLabel(comps){var tw=comps.reduce(function(s,c){return s+c.weight},0)||100;return comps.map(function(c){return Math.round((c.weight/tw)*100)+'% '+c.ticker}).join(' / ');}
const PIE_COLORS=['#ff8c00','#00bfff','#ffd700','#00d26a','#ff3b3b','#9966ff','#00cccc','#ff6699','#66bb6a','#ff7043','#ab47bc','#42a5f5','#ffca28','#ef5350','#26a69a','#7e57c2'];

// ════════════════════════════════════════════════════
// PERFORMANCE CHART
// ════════════════════════════════════════════════════
function PerfChart(props){
  var positions=props.positions,benchmarkComponents=props.benchmarkComponents,snapshots=props.snapshots,snapCount=props.snapCount||0,height=props.height||280;
  var canvasRef=useRef(null),chartRef=useRef(null);
  var _s=useState('idle'),status=_s[0],setStatus=_s[1];
  var histRef=useRef(null); // fetched once, never again
  var didFetchRef=useRef(false);
  var _p=useState('INCEP'),period=_p[0],setPeriod=_p[1];
  var active=positions.filter(function(p){return p.shares>0});
  var bmLbl=bmLabel(benchmarkComponents);
  var INCEPTION='2026-02-02';

  // Fetch history ONCE on mount only
  useEffect(function(){
    if(active.length===0||didFetchRef.current)return;
    didFetchRef.current=true;
    setStatus('loading');
    var bmTickers=benchmarkComponents.map(function(c){return c.ticker});
    var allTickers=Array.from(new Set(active.map(function(p){return p.ticker}).concat(bmTickers)));

    fetchBatchHistory(allTickers,'6mo').then(function(histMap){
      if(histMap){
        var pts=[];
        var bmWithHist=bmTickers.filter(function(t){return histMap[t]&&histMap[t].length>1});
        if(bmWithHist.length>0){
          var baseDates=new Set(histMap[bmWithHist[0]].map(function(d){return d.date}));
          bmWithHist.slice(1).forEach(function(t){var ds=new Set((histMap[t]||[]).map(function(d){return d.date}));baseDates=new Set(Array.from(baseDates).filter(function(d){return ds.has(d)}));});
          var sortedDates=Array.from(baseDates).sort();
          if(sortedDates.length>=2){
            var lookup={};Object.keys(histMap).forEach(function(t){lookup[t]={};histMap[t].forEach(function(d){lookup[t][d.date]=d.close;});});
            Object.keys(lookup).forEach(function(t){var last=null;sortedDates.forEach(function(d){if(lookup[t][d]!=null)last=lookup[t][d];else if(last!=null)lookup[t][d]=last;});});
            var tw=benchmarkComponents.reduce(function(s,c){return s+c.weight},0)||100;
            sortedDates.forEach(function(d){
              var pv=0;active.forEach(function(p){var pr=lookup[p.ticker]&&lookup[p.ticker][d];pv+=p.shares*(pr||p.avgCost);});
              var bv=0;benchmarkComponents.forEach(function(c){var pr=lookup[c.ticker]&&lookup[c.ticker][d];if(pr)bv+=(c.weight/tw)*pr;});
